---
#
# Playbook invoked by Kloigos after each `deallocate` call.
#
#   compute_id
#   hostname
#   ansible_host
#   server_private_ip
#   server_public_ip
#   login_user
#
- name: GATHER COMPUTE UNITS TO DEALLOCATE
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  tasks:
    - name: Build ansible inventory dynamically
      add_host:
        name: "{{ compute_id }}"
        ansible_user: ubuntu
        public_hostname: "{{ hostname }}"
        ansible_host: "{{ ansible_host }}"
        server_private_ip: "{{ server_private_ip }}"
        server_public_ip: "{{ server_public_ip | default('', true) }}"
        login_user: "{{ login_user }}"
        private_ip: "{{ private_ip }}"

        groups: dealloc

- name: CLEANUP COMPUTE UNIT
  hosts: dealloc
  gather_facts: no
  become: yes
  tasks:
    - name: finding id for user
      shell: |
        id -u {{ login_user }}
      register: user_id

    - name: remove ssh key to block any new connection
      shell: |
        rm -f /home/{{ login_user }}/.ssh/authorized_keys

    - name: stop the user systemd instance to stop any running process
      shell: |
        systemctl stop user@{{ user_id.stdout }}.service

    - name: severe any open connection
      shell: |
        loginctl kill-user {{ login_user }} || true

    - name: remove allocation IP alias
      shell: |
        IFACE="$(ip -o route show default | awk '{for (i=1; i<=NF; i++) if ($i == "dev") print $(i+1)}' | head -1)"
        ip addr del {{ private_ip }}/32 dev "$IFACE" || true

    - name: remove allocation nftables rules
      shell: |
        NFT_FILE="/etc/nftables.d/kloigos-compute-units.nft"
        if [ -f "$NFT_FILE" ]; then
          sed -i -E "/meta skuid {{ user_id.stdout }} /d" "$NFT_FILE"
          nft -c -f "$NFT_FILE"
          nft -f "$NFT_FILE"
        fi

    - name: remove all files from the compute_unit
      shell: |
        rm -rf /home/{{ login_user }}/*
        rm -rf /opt/{{ login_user }}/*
        rm -rf /mnt/{{ login_user }}/*

    - name: recreate .ssh with safe perms (empty, no keys)
      shell: |
        mkdir -p /home/{{ login_user }}/.ssh
        chown {{ login_user }}:{{ login_user }} /home/{{ login_user }}/.ssh
        chmod 700 /home/{{ login_user }}/.ssh

        touch /home/{{ login_user }}/.ssh/authorized_keys
        chown {{ login_user }}:{{ login_user }} /home/{{ login_user }}/.ssh/authorized_keys
        chmod 600 /home/{{ login_user }}/.ssh/authorized_keys
