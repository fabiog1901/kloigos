---
#
# Playbook invoked by Kloigos after each `init_server` call.
#
# The following extra-vars are passed:
#   hostname
#   server_private_ip
#   server_public_ip
#   ansible_host
#   user_id
#   compute_units
#
- name: GATHER NEW SERVER TO INIT
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  tasks:
    - name: Build ansible inventory dynamically
      add_host:
        name: "{{ hostname }}"
        ansible_user: "{{ user_id }}"
        public_hostname: "{{ hostname }}"
        ansible_host: "{{ ansible_host }}"
        server_private_ip: "{{ server_private_ip }}"
        server_public_ip: "{{ server_public_ip | default('', true) }}"
        groups: init_server

- name: INIT NEW SERVER
  hosts: init_server
  gather_facts: yes
  become: yes
  tasks:
    - name: Find attached disks
      shell: |
        # 1. Get the device path for the root partition
        ROOTLOC=$(lsblk -plo NAME,MOUNTPOINTS | grep -w '/$' | awk '{print $1}')

        # 2. Identify the physical parent disk
        ROOTDISK=$(lsblk -no PKNAME "$ROOTLOC")

        # 3. List disks excluding the OS parent disk
        # Use single backslash for awk in a | block
        lsblk -dpno NAME,TYPE | grep -w 'disk' | grep -vw "$ROOTDISK" | awk '{print $1}'
      args:
        executable: /bin/bash
      register: disks

    - name: Detect primary network interface
      shell: |
        ip -o route show default | awk '{for (i=1; i<=NF; i++) if ($i == "dev") print $(i+1)}' | head -1
      args:
        executable: /bin/bash
      register: primary_iface

    - name: install kloigos IP alias boot script
      copy:
        content: |
          #!/bin/bash
          set -euo pipefail

          IFACE="{{ primary_iface.stdout }}"
          {% for cu in compute_units %}
          ip addr show dev "$IFACE" | grep -q "{{ cu.private_ip }}/" || ip addr add {{ cu.private_ip }}/32 dev "$IFACE"
          {% endfor %}
        dest: /usr/local/sbin/kloigos-ip-aliases
        mode: "0755"

    - name: install kloigos IP alias systemd unit
      copy:
        content: |
          [Unit]
          Description=Kloigos compute unit IP aliases
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/kloigos-ip-aliases
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/kloigos-ip-aliases.service

    - name: enable and apply kloigos IP aliases
      shell: |
        systemctl daemon-reload
        systemctl enable kloigos-ip-aliases.service
        systemctl restart kloigos-ip-aliases.service

    - name: Create a ext4 filesystem
      shell: |
        blkid {{ item }} -t TYPE="ext4" || mkfs.ext4 {{ item }}
      loop: "{{ disks.stdout_lines }}"

    - name: create directory for delegate.conf
      shell: |
        mkdir -p /etc/systemd/system/user@.service.d
        mkdir -p /etc/nftables.d

    - name: write user service delegate.conf
      copy:
        content: |
          [Service]
          Delegate=yes
          DelegateControllers=cpuset cpu io memory pids

        dest: /etc/systemd/system/user@.service.d/delegate.conf

    - name: write base nftables allocation source-IP enforcement table
      copy:
        content: |
          table inet kloigos_compute_units {
            chain egress_control {
              type filter hook output priority filter; policy accept;
            }
          }
        dest: /etc/nftables.d/kloigos-compute-units.nft

    - name: ensure nftables includes kloigos rules
      shell: |
        touch /etc/nftables.conf
        grep -qxF 'include "/etc/nftables.d/*.nft"' /etc/nftables.conf || echo 'include "/etc/nftables.d/*.nft"' >> /etc/nftables.conf
        nft -c -f /etc/nftables.d/kloigos-compute-units.nft
        nft -f /etc/nftables.d/kloigos-compute-units.nft

    - name: reload systemd and restart logind
      shell: |
        systemctl daemon-reload
        systemctl restart systemd-logind

    - name: enforce disk util
      shell: |
