---
# This playbook provisions EC2 instances for Kloigos and saves the inventory to a file.
- name: PROVISION KLOIGOS VMS
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  vars:
    compute_unit_count: 4
    deployment:
      - cluster_name: fabio-kloigos
        copies: 1
        inventory_groups:
          - kloigos
        exact_count: 1
        instance_type: t4g.2xlarge
        instance:
          cpu: 8
          arch: arm64
        volumes:
          os:
            size: 30
            type: standard_ssd
          data:
            - size: 10
              type: standard_ssd
            - size: 10
              type: standard_ssd
            - size: 10
              type: standard_ssd
            - size: 10
              type: standard_ssd
              delete_on_termination: true
        tags:
          Name: fabio-kloigos
          owner: fabio@cockroachlabs.com
        groups:
          - user: ubuntu
            public_ip: yes
            public_key_id: workshop
            cloud: aws
            image: /canonical/ubuntu/server/24.04
            region: ca-central-1
            vpc_id: vpc-0289741dc46c80da8
            security_groups:
              - sg-0e3631bbd91d95940
            zone: a
            subnet: subnet-02ed0abd3c499dca9
  tasks:
    - name: Calculate compute unit CPU width
      set_fact:
        cpu_per_compute_unit: "{{ ((deployment[0].instance.cpu | int) / (compute_unit_count | int)) | int }}"

    - name: Ensure presence of instances
      shell: |
        cloud_instance create -d {{ deployment[0].cluster_name | quote }} \
          --deployment '{{ deployment | to_json }}' \
          --defaults {}
      register: instances

    - name: Capture primary instance record
      set_fact:
        kloigos_instance: "{{ (instances.stdout | from_json)[0] }}"

    - name: Wait for SSH to come up
      wait_for:
        host: "{{ item.public_ip }}"
        port: 22
        timeout: 180
        sleep: 5
        state: started
      loop: "{{ instances.stdout | from_json }}"

    - name: Build ansible inventory dynamically
      add_host:
        # id
        name: "{{ item.public_ip }}"
        id: "{{ item.id }}"

        # locality
        cloud: "{{ item.cloud }}"
        region: "{{ item.region }}"
        zone: "{{ item.zone }}"

        # addresses
        public_hostname: "{{ item.public_hostname }}"
        public_ip: "{{ item.public_ip }}"
        private_hostname: "{{ item.private_hostname }}"
        private_ip: "{{ item.private_ip }}"

        # tags
        ansible_user: "{{ item.ansible_user }}"
        ansible_host: "{{ item.public_ip }}"
        groups: "{{ item.inventory_groups }}"
        cluster_name: "{{ item.cluster_name }}"
        group_name: "{{ item.group_name }}"
        extra_vars: "{{ item.extra_vars }}"
      loop: "{{ instances.stdout | from_json }}"

    - name: save cluster list of hosts
      copy:
        content: |
          {% for item in groups %}
          {% if item not in ['all', 'ungrouped'] %}
          [{{item}}]
          {% for entry in groups[item] %}
          {{ entry }} ansible_host={{ hostvars[entry].ansible_host }} cloud={{ hostvars[entry].cloud }} cluster_name={{ hostvars[entry].cluster_name }}  group_name={{ hostvars[entry].group_name }} id={{ hostvars[entry].id }} region={{ hostvars[entry].region }} zone={{ hostvars[entry].zone }} private_hostname={{ hostvars[entry].private_hostname }} private_ip={{ hostvars[entry].private_ip }} public_hostname={{ hostvars[entry].public_hostname }} public_ip={{ hostvars[entry].public_ip }} ansible_user={{ hostvars[entry].ansible_user }} extra_vars="{{ hostvars[entry].extra_vars }}" 
          {% endfor %} 

          {% endif %}
          {% endfor %}
        dest: kloigos.ini

    - name: Get ENI ID for the instance
      shell: |
        aws ec2 describe-instances \
          --region {{ deployment[0].groups[0].region | quote }} \
          --instance-ids {{ kloigos_instance.id }} \
          --query 'Reservations[].Instances[].NetworkInterfaces[].NetworkInterfaceId' \
          --output text
      register: eni_id

    - name: Allocate secondary private IPs to the EC2 instance
      shell: |
        aws ec2 assign-private-ip-addresses \
          --region {{ deployment[0].groups[0].region | quote }} \
          --network-interface-id {{ eni_id.stdout }} \
          --secondary-private-ip-address-count {{ (compute_unit_count | int) - 1 }}

    - name: Extract the newly assigned private IPs to a temporary file
      shell: |
        aws ec2 describe-network-interfaces \
          --network-interface-ids {{ eni_id.stdout }} \
          --region {{ deployment[0].groups[0].region | quote }} \
          --query 'NetworkInterfaces[0].PrivateIpAddresses[?Primary==`false`].PrivateIpAddress' \
          --output text | tr '\t' '\n'
      register: _private_ips

    - name: Allocate Elastic IPs
      shell: |
        aws ec2 --region {{ deployment[0].groups[0].region | quote }} allocate-address --domain vpc --output json
      register: _allocated_elastic_ips
      loop: "{{ _private_ips.stdout_lines }}"
      loop_control:
        label: "{{ item }}"

    - name: Tag
      shell: |
        aws ec2 --region {{ deployment[0].groups[0].region | quote }} create-tags \
          --resources  {{ (item.stdout | from_json).AllocationId | quote }} \
          --tags Key=Name,Value=kloigos
      loop: "{{ _allocated_elastic_ips.results }}"
    
    - name: Associate Elastic IPs to secondary private IPs
      shell: |
        aws ec2 --region {{ deployment[0].groups[0].region | quote }} associate-address \
          --allocation-id {{ (item.stdout | from_json).AllocationId | quote }} \
          --network-interface-id {{ eni_id.stdout | quote }} \
          --private-ip-address {{ item.item | quote }}
      loop: "{{ _allocated_elastic_ips.results }}"
      loop_control:
        label: "{{ (item.stdout | from_json).PublicIp }} -> {{ item.item }}"

    - name: Capture secondary public IPs
      set_fact:
        secondary_public_ips: "{{ _allocated_elastic_ips.results | map(attribute='stdout') | map('from_json') | map(attribute='PublicIp') | list }}"

    - name: Capture compute unit address inventory
      set_fact:
        compute_unit_private_ips: "{{ [kloigos_instance.private_ip] + _private_ips.stdout_lines }}"
        compute_unit_public_ips: "{{ [kloigos_instance.public_ip] + secondary_public_ips }}"

    - name: Validate compute unit address inventory
      assert:
        that:
          - compute_unit_private_ips | length == compute_unit_count | int
          - compute_unit_public_ips | length == compute_unit_count | int
          - compute_unit_private_ips | select('string') | list | length == compute_unit_count | int
          - compute_unit_public_ips | select('string') | list | length == compute_unit_count | int

    - name: Initialize Kloigos compute unit init list
      set_fact:
        kloigos_compute_units: []

    - name: Build Kloigos compute unit init list
      set_fact:
        kloigos_compute_units: >-
          {{ kloigos_compute_units + [{
            "ordinal": item + 1,
            "cpu_range": start_cpu ~ "-" ~ end_cpu,
            "private_ip": compute_unit_private_ips[item],
            "public_ip": compute_unit_public_ips[item]
          }] }}
      vars:
        start_cpu: "{{ item * (cpu_per_compute_unit | int) }}"
        end_cpu: >-
          {{ (deployment[0].instance.cpu | int) - 1
             if item == (compute_unit_count | int) - 1
             else start_cpu | int + (cpu_per_compute_unit | int) - 1 }}
      loop: "{{ range(0, compute_unit_count | int) | list }}"

    - name: Build Kloigos server init payload
      set_fact:
        kloigos_server_init:
          hostname: "{{ kloigos_instance.private_hostname | default(kloigos_instance.id) }}"
          private_ip: "{{ kloigos_instance.private_ip }}"
          public_ip: "{{ kloigos_instance.public_ip }}"
          user_id: "{{ kloigos_instance.ansible_user }}"
          region: "{{ kloigos_instance.region }}"
          zone: "{{ kloigos_instance.zone }}"
          cpu_count: "{{ deployment[0].instance.cpu }}"
          disk_count: "{{ deployment[0].volumes.data | length }}"
          tags: "{{ deployment[0].tags }}"
          compute_units: "{{ kloigos_compute_units }}"

    - name: Save Kloigos server init payload
      copy:
        content: |
          {{ kloigos_server_init | to_nice_json }}
        dest: kloigos-server-init.json

