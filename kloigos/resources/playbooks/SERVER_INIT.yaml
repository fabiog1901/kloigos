---
#
# Playbook invoked by Kloigos after each `init_server` call.
#
# The following extra-vars are passed:
#   hostname
#   server_private_ip
#   server_public_ip
#   ansible_host
#   server_admin_user
#   disk_size_gb
#   compute_units
#
- name: GATHER NEW SERVER TO INIT
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  tasks:
    - name: Build ansible inventory dynamically
      add_host:
        name: "{{ hostname }}"
        ansible_user: "{{ server_admin_user }}"
        public_hostname: "{{ hostname }}"
        ansible_host: "{{ ansible_host }}"
        server_private_ip: "{{ server_private_ip }}"
        server_public_ip: "{{ server_public_ip | default('', true) }}"
        groups: init_server

- name: INIT NEW SERVER
  hosts: init_server
  gather_facts: yes
  become: yes
  tasks:
    - name: Install server bootstrap packages
      when: ansible_facts["os_family"] | lower == "debian"
      apt:
        name:
          - e2fsprogs
          - apparmor
          - apparmor-utils
          - libcap2-bin
          - libpam-apparmor
          - lvm2
          - nftables
          - rsync
        state: present
        update_cache: yes

    - name: Prepare Kloigos LVM volume group
      shell: |
        set -euo pipefail

        DEFAULT_VG="kloigos-vg"
        VG_NAME="{{ kloigos_vg_name | default('', true) }}"
        mapfile -t RAW_DISKS < <(
          while read -r disk type; do
            [ "$type" = "disk" ] || continue
            child_count="$(lsblk -nr "$disk" | tail -n +2 | wc -l | tr -d ' ')"
            if [ "$child_count" = "0" ] && ! pvs "$disk" >/dev/null 2>&1; then
              echo "$disk"
            fi
          done < <(lsblk -dnpo NAME,TYPE)
        )

        if [ -z "$VG_NAME" ]; then
          if vgs "$DEFAULT_VG" >/dev/null 2>&1; then
            VG_NAME="$DEFAULT_VG"
          else
            VG_NAME="$(
              vgs --noheadings --units b --nosuffix -o vg_name,vg_free 2>/dev/null \
                | awk '{printf "%.0f %s\n", $2, $1}' \
                | sort -nr \
                | awk 'NR == 1 && $1 > 0 {print $2}'
            )"
          fi
        fi

        if [ -z "$VG_NAME" ]; then
          RAW_DISK_COUNT="$(printf '%s\n' "${RAW_DISKS[@]}" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$RAW_DISK_COUNT" -eq 0 ]; then
            echo "No existing volume group with free space and no unused whole disks were found." >&2
            exit 1
          fi
          VG_NAME="$DEFAULT_VG"
        fi

        if vgs "$VG_NAME" >/dev/null 2>&1; then
          for disk in "${RAW_DISKS[@]}"; do
            pvcreate -ff -y "$disk"
            vgextend "$VG_NAME" "$disk"
          done
        else
          pvcreate -ff -y "${RAW_DISKS[@]}"
          vgcreate "$VG_NAME" "${RAW_DISKS[@]}"
        fi

        echo "$VG_NAME"
      args:
        executable: /bin/bash
      register: kloigos_vg

    - name: Create compute unit logical volumes
      shell: |
        set -euo pipefail

        VG_NAME="{{ kloigos_vg.stdout_lines[-1] }}"
        REMAINING_TO_CREATE=0

        {% for cu in compute_units %}
        if ! lvs "${VG_NAME}/cu{{ '%02d' | format(cu.ordinal) }}" >/dev/null 2>&1; then
          REMAINING_TO_CREATE="$(( REMAINING_TO_CREATE + 1 ))"
        fi
        {% endfor %}

        {% for cu in compute_units %}
        LV_NAME="cu{{ '%02d' | format(cu.ordinal) }}"
        LV_PATH="/dev/${VG_NAME}/${LV_NAME}"
        MOUNT_PATH="/mnt/kloigos/{{ hostname }}/${LV_NAME}"

        if ! lvs "${VG_NAME}/${LV_NAME}" >/dev/null 2>&1; then
          FREE_EXTENTS="$(vgs --noheadings -o vg_free_count "$VG_NAME" | awk '{print $1}')"
          PER_CU_EXTENTS="$(( FREE_EXTENTS / REMAINING_TO_CREATE ))"
          if [ "$PER_CU_EXTENTS" -le 0 ]; then
            echo "Volume group $VG_NAME does not have enough free space for $REMAINING_TO_CREATE remaining compute units." >&2
            exit 1
          fi
          lvcreate -y -l "$PER_CU_EXTENTS" -n "$LV_NAME" "$VG_NAME"
          REMAINING_TO_CREATE="$(( REMAINING_TO_CREATE - 1 ))"
        fi
        blkid "$LV_PATH" -t TYPE="ext4" || mkfs.ext4 -F "$LV_PATH"
        mkdir -p "$MOUNT_PATH"
        UUID="$(blkid -s UUID -o value "$LV_PATH")"
        grep -Eq "^[^#].*[[:space:]]${MOUNT_PATH}[[:space:]]" /etc/fstab || \
          echo "UUID=${UUID} ${MOUNT_PATH} ext4 defaults,nofail 0 2" >> /etc/fstab
        mount "$MOUNT_PATH"
        {% endfor %}
      args:
        executable: /bin/bash

    - name: create directory for delegate.conf
      shell: |
        mkdir -p /etc/systemd/system/user@.service.d
        mkdir -p /etc/nftables.d

    - name: write user service delegate.conf
      copy:
        content: |
          [Service]
          Delegate=yes
          DelegateControllers=cpuset cpu io memory pids

        dest: /etc/systemd/system/user@.service.d/delegate.conf

    - name: write base nftables allocation source-IP enforcement table
      copy:
        content: |
          table inet kloigos_compute_units {
            chain egress_control {
              type filter hook output priority filter; policy accept;
            }
          }
        dest: /etc/nftables.d/kloigos-compute-units.nft

    - name: ensure nftables includes kloigos rules
      shell: |
        touch /etc/nftables.conf
        grep -qxF 'include "/etc/nftables.d/*.nft"' /etc/nftables.conf || echo 'include "/etc/nftables.d/*.nft"' >> /etc/nftables.conf
        nft -c -f /etc/nftables.d/kloigos-compute-units.nft
        nft -f /etc/nftables.d/kloigos-compute-units.nft

    - name: write Kloigos capability audit script
      copy:
        mode: "0755"
        dest: /usr/local/sbin/kloigos-capability-audit
        content: |
          {% raw -%}
          #!/bin/bash
          set -euo pipefail

          TAG="kloigos-capability-audit"
          SCAN_DIRS=()
          RISKY_CAPS=(
            cap_sys_admin
            cap_net_admin
            cap_net_raw
            cap_sys_ptrace
            cap_sys_module
            cap_dac_override
            cap_setuid
            cap_setgid
          )

          for dir in /usr /bin /sbin /usr/local/bin /usr/local/sbin /opt /home /mnt; do
            [ -e "$dir" ] && SCAN_DIRS+=("$dir")
          done

          if [ "${#SCAN_DIRS[@]}" -eq 0 ]; then
            logger -t "$TAG" "kloigos_capability_audit=true severity=info message=no_scan_dirs"
            exit 0
          fi

          found_any=0
          while IFS= read -r line; do
            [ -n "$line" ] || continue
            found_any=1
            path="${line%% = *}"
            caps="${line#* = }"
            risky_found=()

            for cap in "${RISKY_CAPS[@]}"; do
              if [[ "$caps" == *"$cap"* ]]; then
                risky_found+=("$cap")
              fi
            done

            severity="info"
            if [ "${#risky_found[@]}" -gt 0 ]; then
              severity="warning"
              case "$path" in
                /home/*|/opt/*|/mnt/*)
                  severity="critical"
                  ;;
              esac
            fi

            risky_csv=""
            if [ "${#risky_found[@]}" -gt 0 ]; then
              IFS=,
              risky_csv="${risky_found[*]}"
              unset IFS
            fi

            logger -t "$TAG" "kloigos_capability_audit=true severity=${severity} path=${path} caps=${caps} risky_caps=${risky_csv}"
          done < <(getcap -r "${SCAN_DIRS[@]}" 2>/dev/null || true)

          if [ "$found_any" -eq 0 ]; then
            logger -t "$TAG" "kloigos_capability_audit=true severity=info message=no_file_capabilities_found"
          fi
          {% endraw %}

    - name: write Kloigos capability audit service
      copy:
        mode: "0644"
        dest: /etc/systemd/system/kloigos-capability-audit.service
        content: |
          [Unit]
          Description=Kloigos file capability audit

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/kloigos-capability-audit

    - name: write Kloigos capability audit timer
      copy:
        mode: "0644"
        dest: /etc/systemd/system/kloigos-capability-audit.timer
        content: |
          [Unit]
          Description=Run Kloigos file capability audit periodically

          [Timer]
          OnBootSec=2min
          OnUnitActiveSec=5min
          AccuracySec=30s
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: reload systemd and restart logind
      shell: |
        systemctl daemon-reload
        systemctl enable --now kloigos-capability-audit.timer
        systemctl restart systemd-logind

