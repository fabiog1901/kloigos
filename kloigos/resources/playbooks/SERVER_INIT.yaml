---
#
# Playbook invoked by Kloigos after each `init_server` call.
#
# The following extra-vars are passed:
#   hostname
#   server_private_ip
#   server_public_ip
#   ansible_host
#   server_admin_user
#   disk_size_gb
#   compute_units
#
- name: GATHER NEW SERVER TO INIT
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  tasks:
    - name: Build ansible inventory dynamically
      add_host:
        name: "{{ hostname }}"
        ansible_user: "{{ server_admin_user }}"
        public_hostname: "{{ hostname }}"
        ansible_host: "{{ ansible_host }}"
        server_private_ip: "{{ server_private_ip }}"
        server_public_ip: "{{ server_public_ip | default('', true) }}"
        groups: init_server

- name: INIT NEW SERVER
  hosts: init_server
  gather_facts: yes
  become: yes
  tasks:
    - name: Install server bootstrap packages
      when: ansible_facts["os_family"] | lower == "debian"
      apt:
        name:
          - e2fsprogs
          - apparmor
          - apparmor-utils
          - libpam-apparmor
          - lvm2
          - nftables
          - rsync
        state: present
        update_cache: yes

    - name: Prepare Kloigos LVM volume group
      shell: |
        set -euo pipefail

        DEFAULT_VG="kloigos-vg"
        VG_NAME="{{ kloigos_vg_name | default('', true) }}"
        mapfile -t RAW_DISKS < <(
          while read -r disk type; do
            [ "$type" = "disk" ] || continue
            child_count="$(lsblk -nr "$disk" | tail -n +2 | wc -l | tr -d ' ')"
            if [ "$child_count" = "0" ] && ! pvs "$disk" >/dev/null 2>&1; then
              echo "$disk"
            fi
          done < <(lsblk -dnpo NAME,TYPE)
        )

        if [ -z "$VG_NAME" ]; then
          if vgs "$DEFAULT_VG" >/dev/null 2>&1; then
            VG_NAME="$DEFAULT_VG"
          else
            VG_NAME="$(
              vgs --noheadings --units b --nosuffix -o vg_name,vg_free 2>/dev/null \
                | awk '{printf "%.0f %s\n", $2, $1}' \
                | sort -nr \
                | awk 'NR == 1 && $1 > 0 {print $2}'
            )"
          fi
        fi

        if [ -z "$VG_NAME" ]; then
          RAW_DISK_COUNT="$(printf '%s\n' "${RAW_DISKS[@]}" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$RAW_DISK_COUNT" -eq 0 ]; then
            echo "No existing volume group with free space and no unused whole disks were found." >&2
            exit 1
          fi
          VG_NAME="$DEFAULT_VG"
        fi

        if vgs "$VG_NAME" >/dev/null 2>&1; then
          for disk in "${RAW_DISKS[@]}"; do
            pvcreate -ff -y "$disk"
            vgextend "$VG_NAME" "$disk"
          done
        else
          pvcreate -ff -y "${RAW_DISKS[@]}"
          vgcreate "$VG_NAME" "${RAW_DISKS[@]}"
        fi

        echo "$VG_NAME"
      args:
        executable: /bin/bash
      register: kloigos_vg

    - name: Create compute unit logical volumes
      shell: |
        set -euo pipefail

        VG_NAME="{{ kloigos_vg.stdout_lines[-1] }}"
        CU_COUNT="{{ compute_units | length }}"
        REQUESTED_GB="{{ disk_size_gb | default('', true) }}"

        if [ -n "$REQUESTED_GB" ] && [ "$REQUESTED_GB" != "None" ] && [ "$REQUESTED_GB" -gt 0 ]; then
          SIZE_ARG="-L ${REQUESTED_GB}G"
        else
          FREE_EXTENTS="$(vgs --noheadings -o vg_free_count "$VG_NAME" | awk '{print $1}')"
          PER_CU_EXTENTS="$(( FREE_EXTENTS / CU_COUNT ))"
          if [ "$PER_CU_EXTENTS" -le 0 ]; then
            echo "Volume group $VG_NAME does not have enough free space for $CU_COUNT compute units." >&2
            exit 1
          fi
          SIZE_ARG="-l ${PER_CU_EXTENTS}"
        fi

        {% for cu in compute_units %}
        LV_NAME="cu{{ '%02d' | format(cu.ordinal) }}"
        LV_PATH="/dev/${VG_NAME}/${LV_NAME}"
        MOUNT_PATH="/mnt/kloigos/{{ hostname }}/${LV_NAME}"

        if ! lvs "${VG_NAME}/${LV_NAME}" >/dev/null 2>&1; then
          lvcreate -y $SIZE_ARG -n "$LV_NAME" "$VG_NAME"
        fi
        blkid "$LV_PATH" -t TYPE="ext4" || mkfs.ext4 -F "$LV_PATH"
        mkdir -p "$MOUNT_PATH"
        UUID="$(blkid -s UUID -o value "$LV_PATH")"
        grep -Eq "^[^#].*[[:space:]]${MOUNT_PATH}[[:space:]]" /etc/fstab || \
          echo "UUID=${UUID} ${MOUNT_PATH} ext4 defaults,nofail 0 2" >> /etc/fstab
        mount "$MOUNT_PATH"
        {% endfor %}
      args:
        executable: /bin/bash

    - name: create directory for delegate.conf
      shell: |
        mkdir -p /etc/systemd/system/user@.service.d
        mkdir -p /etc/nftables.d

    - name: write user service delegate.conf
      copy:
        content: |
          [Service]
          Delegate=yes
          DelegateControllers=cpuset cpu io memory pids

        dest: /etc/systemd/system/user@.service.d/delegate.conf

    - name: write base nftables allocation source-IP enforcement table
      copy:
        content: |
          table inet kloigos_compute_units {
            chain egress_control {
              type filter hook output priority filter; policy accept;
            }
          }
        dest: /etc/nftables.d/kloigos-compute-units.nft

    - name: ensure nftables includes kloigos rules
      shell: |
        touch /etc/nftables.conf
        grep -qxF 'include "/etc/nftables.d/*.nft"' /etc/nftables.conf || echo 'include "/etc/nftables.d/*.nft"' >> /etc/nftables.conf
        nft -c -f /etc/nftables.d/kloigos-compute-units.nft
        nft -f /etc/nftables.d/kloigos-compute-units.nft

    - name: reload systemd and restart logind
      shell: |
        systemctl daemon-reload
        systemctl restart systemd-logind

    - name: enforce disk util
      shell: |
        # Optional: enforce 100GB caps on /home and /opt subtrees via ext4 project quotas
