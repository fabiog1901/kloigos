---
#
# Playbook invoked by Kloigos after each allocation scale request.
#
# Scaling is replacement plus migration:
#   1. run an initial rsync from source CU storage to controller scratch
#   2. run an initial rsync from controller scratch to target CU storage
#   3. stop the source user systemd instance
#   4. run a final rsync delta through the same scratch path
#   5. move the allocation floating IP alias from source host to target host
#   6. update nftables source-IP enforcement for the source and target users
#   7. start the target user systemd instance
#
# The following extra-vars are passed:
#   allocation_id
#   allocation_ip_address
#   private_ip
#   source_compute_id
#   source_hostname
#   source_ansible_host
#   source_server_private_ip
#   source_server_public_ip
#   source_server_admin_user
#   source_storage_mount_path
#   login_user
#   source_cpu_range
#   source_cpu_set
#   same_host
#   target_compute_id
#   target_hostname
#   target_ansible_host
#   target_server_private_ip
#   target_server_public_ip
#   target_server_admin_user
#   target_storage_mount_path
#   login_user
#   target_cpu_range
#   target_cpu_set
#   target_cpu_count
#
- name: GATHER ALLOCATION SCALE HOSTS
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  tasks:
    - name: Build source host inventory dynamically
      add_host:
        name: "{{ source_compute_id }}"
        ansible_user: "{{ source_server_admin_user }}"
        public_hostname: "{{ source_hostname }}"
        ansible_host: "{{ source_ansible_host }}"
        server_private_ip: "{{ source_server_private_ip }}"
        server_public_ip: "{{ source_server_public_ip | default('', true) }}"
        server_admin_user: "{{ source_server_admin_user }}"
        login_user: "{{ login_user }}"
        source_storage_mount_path: "{{ source_storage_mount_path }}"
        groups: scale_source

    - name: Build target host inventory dynamically
      add_host:
        name: "{{ target_compute_id }}"
        ansible_user: "{{ target_server_admin_user }}"
        public_hostname: "{{ target_hostname }}"
        ansible_host: "{{ target_ansible_host }}"
        server_private_ip: "{{ target_server_private_ip }}"
        server_public_ip: "{{ target_server_public_ip | default('', true) }}"
        server_admin_user: "{{ target_server_admin_user }}"
        login_user: "{{ login_user }}"
        target_storage_mount_path: "{{ target_storage_mount_path }}"
        target_cpu_set: "{{ target_cpu_set }}"
        cpu_count: "{{ target_cpu_count }}"
        groups: scale_target

    - name: Create controller migration scratch directories
      file:
        path: "/tmp/kloigos-scale/{{ allocation_id }}/{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - home
        - opt
        - mnt

- name: PREPARE TARGET COMPUTE UNIT
  hosts: scale_target
  gather_facts: yes
  become: yes
  tasks:
    - name: Fail when mandatory SELinux confinement is not implemented
      when: ansible_facts["os_family"] | lower == "redhat"
      fail:
        msg: "Kloigos requires mandatory SELinux confinement on RedHat-family hosts, but SELinux policy installation is not implemented yet."

    - name: Ensure AppArmor is available and enabled
      when: ansible_facts["os_family"] | lower == "debian"
      shell: |
        set -euo pipefail
        command -v apparmor_parser >/dev/null
        aa-enabled --quiet
      args:
        executable: /bin/bash

    - name: Ensure target allocation user exists
      shell: |
        set -euo pipefail
        id {{ login_user }} || useradd --create-home --home-dir /home/{{ login_user }} --shell /bin/bash {{ login_user }}
      args:
        executable: /bin/bash

    - name: Ensure target data directories exist
      shell: |
        set -euo pipefail
        mkdir -p /home/{{ login_user }}/.ssh
        mkdir -p /opt/{{ login_user }}
        chown -R {{ login_user }}:{{ login_user }} /home/{{ login_user }}
        chown -R {{ login_user }}:{{ login_user }} /opt/{{ login_user }}
        chown -R {{ login_user }}:{{ login_user }} {{ target_storage_mount_path }}
        chmod 0750 /home/{{ login_user }}
        chmod 0750 /opt/{{ login_user }}
        chmod 0750 {{ target_storage_mount_path }}
      args:
        executable: /bin/bash

    - name: Find target allocation user id
      shell: |
        id -u {{ login_user }}
      register: target_login_uid

    - name: Prepare target allocation slice directory
      shell: |
        set -euo pipefail
        mkdir -p /etc/systemd/system/user-{{ target_login_uid.stdout }}.slice.d
        mkdir -p /etc/systemd/system/user@{{ target_login_uid.stdout }}.service.d
        mkdir -p /etc/apparmor.d
        mkdir -p /etc/nftables.d
      args:
        executable: /bin/bash

    - name: Install mandatory AppArmor profile for target allocation user
      when: ansible_facts["os_family"] | lower == "debian"
      copy:
        dest: /etc/apparmor.d/kloigos-{{ login_user }}
        mode: "0644"
        content: |
          #include <tunables/global>

          profile kloigos-{{ login_user }} flags=(attach_disconnected,mediate_deleted) {
            #include <abstractions/base>
            #include <abstractions/nameservice>

            capability dac_read_search,
            capability setgid,
            capability setuid,

            network inet stream,
            network inet6 stream,

            / r,
            /bin/** rix,
            /sbin/** rix,
            /usr/** rix,
            /lib/** rix,
            /lib64/** rix,

            /etc/ld.so.cache r,
            /etc/ld.so.conf r,
            /etc/ld.so.conf.d/** r,
            /etc/profile r,
            /etc/profile.d/** r,
            /etc/bash.bashrc r,
            /etc/inputrc r,
            /etc/hosts r,
            /etc/resolv.conf r,
            /etc/passwd r,
            /etc/group r,
            /etc/nsswitch.conf r,
            /etc/mime.types r,
            /etc/apt/** r,
            /var/lib/apt/** r,
            /var/cache/apt/** r,
            /var/lib/command-not-found/** r,
            /var/lib/command-not-found/commands.db k,
            /var/lib/dpkg/** r,

            owner /home/{{ login_user }}/** rwklix,
            owner /opt/{{ login_user }}/** rwklix,
            owner /mnt/{{ login_user }}/** rwklix,
            /home/{{ login_user }}/ r,
            /opt/{{ login_user }}/ r,
            /mnt/{{ login_user }}/ r,

            owner /run/user/{{ target_login_uid.stdout }}/** rwklix,
            owner /tmp/** rwkl,
            /tmp/ rw,
            /dev/null rw,
            /dev/zero r,
            /dev/urandom r,
            /dev/random r,
            /dev/tty rw,
            /dev/pts/* rw,

            /proc/ r,
            /proc/self/** r,
            /proc/sys/kernel/random/boot_id r,
            owner /proc/@{pid}/** rw,

            deny /etc/shadow r,
            deny /etc/sudoers r,
            deny /etc/sudoers.d/** r,
            deny /root/** rwklx,
            deny /proc/sys/** rwklx,
            deny /sys/** rwklx,
          }

    - name: Load mandatory AppArmor profile for target allocation user
      when: ansible_facts["os_family"] | lower == "debian"
      shell: |
        set -euo pipefail
        apparmor_parser -r /etc/apparmor.d/kloigos-{{ login_user }}
      args:
        executable: /bin/bash

    - name: Attach target allocation user manager to AppArmor profile
      when: ansible_facts["os_family"] | lower == "debian"
      copy:
        dest: /etc/systemd/system/user@{{ target_login_uid.stdout }}.service.d/50-kloigos-apparmor.conf
        mode: "0644"
        content: |
          [Service]
          AppArmorProfile=kloigos-{{ login_user }}

    - name: Force target SSH sessions through allocation AppArmor profile
      when: ansible_facts["os_family"] | lower == "debian"
      copy:
        dest: /etc/ssh/sshd_config.d/kloigos-{{ login_user }}.conf
        mode: "0644"
        content: |
          Match User {{ login_user }}
              ForceCommand /usr/local/sbin/kloigos-aa-shell

    - name: Reload target SSH after AppArmor login confinement update
      when: ansible_facts["os_family"] | lower == "debian"
      shell: |
        set -euo pipefail
        SSHD_BIN="$(command -v sshd || echo /usr/sbin/sshd)"
        "$SSHD_BIN" -t
        systemctl reload ssh || systemctl reload sshd || true
      args:
        executable: /bin/bash

    - name: Allocate memory proportionate to CPU count
      shell: |
        MEM_TOT=`cat /proc/meminfo | grep "MemTotal" | awk '{print $2}'`
        CPU_COUNT=`cat /proc/cpuinfo | grep -c processor`
        echo $MEM_TOT / $CPU_COUNT | bc
      register: mem_kb_per_cpu

    - name: Get cpu,numa_node from lscpu
      shell: |
        lscpu -p=CPU,NODE | grep -v '#'
      register: lscpu_p

    - name: Build cpu_to_node dict from lscpu
      set_fact:
        cpu_to_node: "{{ cpu_to_node | default({}) | combine({ (item.split(',')[0]): (item.split(',')[1]) }) }}"
      loop: "{{ lscpu_p.stdout_lines }}"

    - name: Write target allocation user slice override
      copy:
        content: |
          [Slice]

          AllowedCPUs={{ target_cpu_set }}
          CPUAccounting=yes
          MemoryAccounting=yes
          IOAccounting=yes
          TasksMax=2048
          AllowedMemoryNodes={{ cpu_to_node[target_cpu_set.split(',')[0]] }}
          MemoryNodes={{ cpu_to_node[target_cpu_set.split(',')[0]] }}
          MemoryHigh={{ (target_cpu_set.split(',') | length * mem_kb_per_cpu.stdout | int / 1024 / 1024) | round(0, 'floor') | int }}G
          MemoryMax={{ (target_cpu_set.split(',') | length * mem_kb_per_cpu.stdout | int * 0.9 / 1024 / 1024) | round(0, 'floor') | int }}G

        dest: /etc/systemd/system/user-{{ target_login_uid.stdout }}.slice.d/50-kloigos.conf

- name: INITIAL RSYNC SOURCE TO CONTROLLER
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  vars:
    scratch_root: "/tmp/kloigos-scale/{{ allocation_id }}"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  tasks:
    - name: Initial rsync home from source to controller
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rsync -a --delete \
          -e "ssh {{ ssh_opts }}" \
          --rsync-path="sudo rsync" \
          {{ source_server_admin_user }}@{{ source_ansible_host }}:/home/{{ login_user }}/ {{ scratch_root }}/home/
      args:
        executable: /bin/bash

    - name: Initial rsync opt from source to controller
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rsync -a --delete \
          -e "ssh {{ ssh_opts }}" \
          --rsync-path="sudo rsync" \
          {{ source_server_admin_user }}@{{ source_ansible_host }}:/opt/{{ login_user }}/ {{ scratch_root }}/opt/
      args:
        executable: /bin/bash

    - name: Initial rsync mnt from source to controller
      shell: |
        set -euo pipefail
        rsync -a --delete \
          -e "ssh {{ ssh_opts }}" \
          --rsync-path="sudo rsync" \
          {{ source_server_admin_user }}@{{ source_ansible_host }}:/mnt/{{ login_user }}/ {{ scratch_root }}/mnt/
      args:
        executable: /bin/bash

    - name: Initial rsync controller home to target
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ scratch_root }}/home/ {{ target_server_admin_user }}@{{ target_ansible_host }}:/home/{{ login_user }}/
      args:
        executable: /bin/bash

    - name: Initial rsync controller opt to target
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ scratch_root }}/opt/ {{ target_server_admin_user }}@{{ target_ansible_host }}:/opt/{{ login_user }}/
      args:
        executable: /bin/bash

    - name: Initial rsync controller mnt to target
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ scratch_root }}/mnt/ {{ target_server_admin_user }}@{{ target_ansible_host }}:{{ target_storage_mount_path }}/
      args:
        executable: /bin/bash

- name: QUIESCE SOURCE COMPUTE UNIT
  hosts: scale_source
  gather_facts: no
  become: yes
  tasks:
    - name: Stop source user services and sessions
      shell: |
        set -euo pipefail
        SOURCE_UID="$(id -u {{ login_user }})"
        systemctl stop user@"$SOURCE_UID".service || true
        loginctl kill-user {{ login_user }} || true
      args:
        executable: /bin/bash

- name: FINAL RSYNC DELTA THROUGH CONTROLLER
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  vars:
    scratch_root: "/tmp/kloigos-scale/{{ allocation_id }}"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  tasks:
    - name: Final rsync home from source to controller
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ source_server_admin_user }}@{{ source_ansible_host }}:/home/{{ login_user }}/ {{ scratch_root }}/home/
      args:
        executable: /bin/bash

    - name: Final rsync opt from source to controller
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ source_server_admin_user }}@{{ source_ansible_host }}:/opt/{{ login_user }}/ {{ scratch_root }}/opt/
      args:
        executable: /bin/bash

    - name: Final rsync mnt from source to controller
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ source_server_admin_user }}@{{ source_ansible_host }}:/mnt/{{ login_user }}/ {{ scratch_root }}/mnt/
      args:
        executable: /bin/bash

    - name: Final rsync controller home to target
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ scratch_root }}/home/ {{ target_server_admin_user }}@{{ target_ansible_host }}:/home/{{ login_user }}/
      args:
        executable: /bin/bash

    - name: Final rsync controller opt to target
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ scratch_root }}/opt/ {{ target_server_admin_user }}@{{ target_ansible_host }}:/opt/{{ login_user }}/
      args:
        executable: /bin/bash

    - name: Final rsync controller mnt to target
      shell: |
        set -euo pipefail
        rsync -a --delete -e "ssh {{ ssh_opts }}" --rsync-path="sudo rsync" {{ scratch_root }}/mnt/ {{ target_server_admin_user }}@{{ target_ansible_host }}:{{ target_storage_mount_path }}/
      args:
        executable: /bin/bash

- name: MOVE FLOATING IP OFF SOURCE
  hosts: scale_source
  gather_facts: yes
  become: yes
  tasks:
    - name: Remove floating IP alias from source host
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        IFACE="$(ip -o route show default | awk '{for (i=1; i<=NF; i++) if ($i == "dev") print $(i+1)}' | head -1)"
        ip addr del {{ allocation_ip_address }}/32 dev "$IFACE" || true
      args:
        executable: /bin/bash

    - name: Remove source allocation nftables rules
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        SOURCE_UID="$(id -u {{ login_user }})"
        NFT_FILE="/etc/nftables.d/kloigos-compute-units.nft"
        if [ -f "$NFT_FILE" ]; then
          sed -i -E "/meta skuid ${SOURCE_UID} /d" "$NFT_FILE"
          nft -c -f "$NFT_FILE"
          nft -f "$NFT_FILE"
        fi
      args:
        executable: /bin/bash

    - name: Clear source compute unit data after final rsync
      when: not (same_host | bool)
      shell: |
        set -euo pipefail
        rm -rf /home/{{ login_user }}/*
        rm -rf /opt/{{ login_user }}/*
        rm -rf /mnt/{{ login_user }}/*
        sed -i '\#{{ source_storage_mount_path }} /mnt/{{ login_user }} none bind 0 0#d' /etc/fstab
        umount /mnt/{{ login_user }} || true
        rmdir /mnt/{{ login_user }} || true
        mkdir -p /home/{{ login_user }}/.ssh
        chown {{ login_user }}:{{ login_user }} /home/{{ login_user }}/.ssh
        chmod 700 /home/{{ login_user }}/.ssh
        touch /home/{{ login_user }}/.ssh/authorized_keys
        chown {{ login_user }}:{{ login_user }} /home/{{ login_user }}/.ssh/authorized_keys
        chmod 600 /home/{{ login_user }}/.ssh/authorized_keys
      args:
        executable: /bin/bash

    - name: Detach old source storage bind mount for same-host scale
      when: same_host | bool
      shell: |
        set -euo pipefail
        sed -i '\#{{ source_storage_mount_path }} /mnt/{{ login_user }} none bind 0 0#d' /etc/fstab
        umount /mnt/{{ login_user }} || true
        rmdir /mnt/{{ login_user }} || true
      args:
        executable: /bin/bash

    - name: Remove source allocation AppArmor systemd attachment
      when:
        - ansible_facts["os_family"] | lower == "debian"
        - not (same_host | bool)
      shell: |
        SOURCE_UID="$(id -u {{ login_user }} 2>/dev/null || true)"
        if [ -n "$SOURCE_UID" ]; then
          rm -rf /etc/systemd/system/user@"$SOURCE_UID".service.d/50-kloigos-apparmor.conf
          rmdir /etc/systemd/system/user@"$SOURCE_UID".service.d 2>/dev/null || true
        fi
        rm -f /etc/ssh/sshd_config.d/kloigos-{{ login_user }}.conf
        SSHD_BIN="$(command -v sshd || echo /usr/sbin/sshd)"
        "$SSHD_BIN" -t
        systemctl reload ssh || systemctl reload sshd || true

    - name: Unload and remove source allocation AppArmor profile
      when:
        - ansible_facts["os_family"] | lower == "debian"
        - not (same_host | bool)
      shell: |
        apparmor_parser -R /etc/apparmor.d/kloigos-{{ login_user }} 2>/dev/null || true
        rm -f /etc/apparmor.d/kloigos-{{ login_user }}

- name: MOVE FLOATING IP TO TARGET
  hosts: scale_target
  gather_facts: no
  become: yes
  tasks:
    - name: Add floating IP alias to target host
      shell: |
        set -euo pipefail
        IFACE="$(ip -o route show default | awk '{for (i=1; i<=NF; i++) if ($i == "dev") print $(i+1)}' | head -1)"
        ip addr show dev "$IFACE" | grep -q "{{ allocation_ip_address }}/" || ip addr add {{ allocation_ip_address }}/32 dev "$IFACE"
      args:
        executable: /bin/bash

    - name: Make target file ownership match target compute-unit user
      shell: |
        set -euo pipefail
        mkdir -p /mnt/{{ login_user }}
        if findmnt -n /mnt/{{ login_user }} >/dev/null 2>&1; then
          current_source="$(findmnt -n -o SOURCE --target /mnt/{{ login_user }})"
          if [ "$current_source" != "{{ target_storage_mount_path }}" ]; then
            echo "/mnt/{{ login_user }} is already mounted from $current_source, expected {{ target_storage_mount_path }}." >&2
            exit 1
          fi
        else
          mount --bind {{ target_storage_mount_path }} /mnt/{{ login_user }}
        fi
        sed -i '\#{{ source_storage_mount_path }} /mnt/{{ login_user }} none bind 0 0#d' /etc/fstab
        grep -Eq "^[^#].*[[:space:]]/mnt/{{ login_user }}[[:space:]]+none[[:space:]]+bind" /etc/fstab || \
          echo "{{ target_storage_mount_path }} /mnt/{{ login_user }} none bind 0 0" >> /etc/fstab
        chown -R {{ login_user }}:{{ login_user }} /home/{{ login_user }}
        chown -R {{ login_user }}:{{ login_user }} /opt/{{ login_user }}
        chown -R {{ login_user }}:{{ login_user }} /mnt/{{ login_user }}
        chmod 0750 /mnt/{{ login_user }}
      args:
        executable: /bin/bash

    - name: Update target nftables source-IP rule to floating IP
      shell: |
        set -euo pipefail
        TARGET_UID="$(id -u {{ login_user }})"
        NFT_FILE="/etc/nftables.d/kloigos-compute-units.nft"
        touch "$NFT_FILE"
        if ! grep -q 'table inet kloigos_compute_units' "$NFT_FILE"; then
          printf '%s\n' \
            'table inet kloigos_compute_units {' \
            '  chain egress_control {' \
            '    type filter hook output priority filter; policy accept;' \
            '  }' \
            '}' > "$NFT_FILE"
        fi
        sed -i -E "/meta skuid ${TARGET_UID} /d" "$NFT_FILE"
        sed -i "/policy accept;/a\\              meta skuid ${TARGET_UID} ip saddr != {{ allocation_ip_address }} drop\\n              meta skuid ${TARGET_UID} meta nfproto ipv6 drop" "$NFT_FILE"
        touch /etc/nftables.conf
        grep -qxF 'include "/etc/nftables.d/*.nft"' /etc/nftables.conf || echo 'include "/etc/nftables.d/*.nft"' >> /etc/nftables.conf
        nft -c -f "$NFT_FILE"
        nft -f "$NFT_FILE"
      args:
        executable: /bin/bash

    - name: Start target user services
      shell: |
        set -euo pipefail
        TARGET_UID="$(id -u {{ login_user }})"
        systemctl daemon-reload
        loginctl enable-linger {{ login_user }}
        systemctl restart user@"$TARGET_UID".service
        systemctl restart user-"$TARGET_UID".slice || true
      args:
        executable: /bin/bash

- name: CLEAN CONTROLLER MIGRATION SCRATCH
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  tasks:
    - name: Remove controller migration scratch directory
      file:
        path: "/tmp/kloigos-scale/{{ allocation_id }}"
        state: absent
