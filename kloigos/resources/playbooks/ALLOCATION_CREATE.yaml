---
#
# Playbook invoked by Kloigos after each `allocate` call.
#
# The following extra-vars are passed:
#   compute_id
#   hostname
#   ansible_host
#   server_private_ip
#   server_public_ip
#   server_admin_user
#   private_ip
#   public_ip
#   login_user
#   compute_unit_storage_mount_path
#   cpu_range
#   cpu_set
#   cpu_count
#   ssh_public_key
#
#
- name: GATHER COMPUTE UNIT TO ALLOCATE
  hosts: localhost
  connection: local
  gather_facts: no
  become: no
  tasks:
    - name: Build ansible inventory dynamically
      add_host:
        name: "{{ compute_id }}"
        ansible_user: "{{ server_admin_user }}"
        public_hostname: "{{ hostname }}"
        ansible_host: "{{ ansible_host }}"
        server_private_ip: "{{ server_private_ip }}"
        server_public_ip: "{{ server_public_ip | default('', true) }}"
        server_admin_user: "{{ server_admin_user }}"
        private_ip: "{{ private_ip }}"
        public_ip: "{{ public_ip | default('', true) }}"
        login_user: "{{ login_user }}"
        compute_unit_storage_mount_path: "{{ compute_unit_storage_mount_path }}"
        cpu_set: "{{ cpu_set }}"
        cpu_count: "{{ cpu_count }}"
        groups: new_alloc


- name: ALLOCATE COMPUTE UNIT
  hosts: new_alloc
  gather_facts: yes
  become: yes
  tasks:
    - name: Fail when mandatory SELinux confinement is not implemented
      when: ansible_facts["os_family"] | lower == "redhat"
      fail:
        msg: "Kloigos requires mandatory SELinux confinement on RedHat-family hosts, but SELinux policy installation is not implemented yet."

    - name: Ensure AppArmor is available and enabled
      when: ansible_facts["os_family"] | lower == "debian"
      shell: |
        set -euo pipefail
        command -v apparmor_parser >/dev/null
        aa-enabled --quiet
      args:
        executable: /bin/bash

    - name: Create allocation user
      shell: |
        set -euo pipefail
        id {{ login_user }} || useradd --create-home --home-dir /home/{{ login_user }} --shell /bin/bash {{ login_user }}
      args:
        executable: /bin/bash

    - name: Create allocation directories
      shell: |
        set -euo pipefail
        mkdir -p /opt/{{ login_user }}
        mkdir -p /home/{{ login_user }}
        mkdir -p /home/{{ login_user }}/.ssh
        chown -R {{ login_user }}:{{ login_user }} /opt/{{ login_user }}
        chown -R {{ login_user }}:{{ login_user }} /home/{{ login_user }}
        chmod 0750 /opt/{{ login_user }}
        chmod 0750 /home/{{ login_user }}
        chmod 0700 /home/{{ login_user }}/.ssh
      args:
        executable: /bin/bash

    - name: Mount compute unit storage for allocation
      shell: |
        set -euo pipefail
        SRC="{{ compute_unit_storage_mount_path }}"
        DST="/mnt/{{ login_user }}"

        if [ ! -d "$SRC" ]; then
          echo "Compute unit storage path $SRC does not exist or is not mounted." >&2
          exit 1
        fi
        if ! findmnt -T "$SRC" >/dev/null 2>&1; then
          echo "Compute unit storage path $SRC is not on a mounted filesystem." >&2
          exit 1
        fi

        mkdir -p "$DST"
        if findmnt -n "$DST" >/dev/null 2>&1; then
          current_source="$(findmnt -n -o SOURCE --target "$DST")"
          if [ "$current_source" != "$SRC" ]; then
            echo "$DST is already mounted from $current_source, expected $SRC." >&2
            exit 1
          fi
        else
          mount --bind "$SRC" "$DST"
        fi
        grep -Eq "^[^#].*[[:space:]]${DST}[[:space:]]+none[[:space:]]+bind" /etc/fstab || \
          echo "${SRC} ${DST} none bind 0 0" >> /etc/fstab
        chown -R {{ login_user }}:{{ login_user }} "$DST"
        chmod 0750 "$DST"
      args:
        executable: /bin/bash

    - name: Add allocation IP alias
      shell: |
        set -euo pipefail
        IFACE="$(ip -o route show default | awk '{for (i=1; i<=NF; i++) if ($i == "dev") print $(i+1)}' | head -1)"
        ip addr show dev "$IFACE" | grep -q "{{ private_ip }}/" || ip addr add {{ private_ip }}/32 dev "$IFACE"
        mkdir -p /etc/kloigos/floating-ips.d
        printf 'ip_address="%s"\nprefix="32"\ninterface="%s"\n' "{{ private_ip }}" "$IFACE" > /etc/kloigos/floating-ips.d/{{ login_user }}.conf
        chmod 0644 /etc/kloigos/floating-ips.d/{{ login_user }}.conf
        systemctl daemon-reload
        systemctl enable --now kloigos-floating-ips.service || true
      args:
        executable: /bin/bash

    - name: Find allocation user id
      shell: |
        id -u {{ login_user }}
      register: login_uid

    - name: Prepare systemd, AppArmor, and nftables directories
      shell: |
        set -euo pipefail
        mkdir -p /etc/systemd/system/user-{{ login_uid.stdout }}.slice.d
        mkdir -p /etc/systemd/system/user@{{ login_uid.stdout }}.service.d
        mkdir -p /etc/apparmor.d
        mkdir -p /etc/nftables.d
      args:
        executable: /bin/bash

    - name: Install mandatory AppArmor profile for allocation user
      when: ansible_facts["os_family"] | lower == "debian"
      copy:
        dest: /etc/apparmor.d/kloigos-{{ login_user }}
        mode: "0644"
        content: |
          #include <tunables/global>

          profile kloigos-{{ login_user }} flags=(attach_disconnected,mediate_deleted) {
            #include <abstractions/base>
            #include <abstractions/nameservice>

            capability dac_read_search,
            capability setgid,
            capability setuid,

            network inet stream,
            network inet6 stream,

            / r,
            /bin/** rix,
            /sbin/** rix,
            /usr/** rix,
            /lib/** rix,
            /lib64/** rix,

            /etc/ld.so.cache r,
            /etc/ld.so.conf r,
            /etc/ld.so.conf.d/** r,
            /etc/profile r,
            /etc/profile.d/** r,
            /etc/bash.bashrc r,
            /etc/inputrc r,
            /etc/hosts r,
            /etc/resolv.conf r,
            /etc/passwd r,
            /etc/group r,
            /etc/nsswitch.conf r,
            /etc/apt/** r,
            /var/lib/apt/** r,
            /var/cache/apt/** r,
            /var/lib/command-not-found/** r,
            /var/lib/command-not-found/commands.db k,
            /var/lib/dpkg/** r,

            owner /home/{{ login_user }}/** rwklix,
            owner /opt/{{ login_user }}/** rwklix,
            owner /mnt/{{ login_user }}/** rwklix,
            /home/{{ login_user }}/ r,
            /opt/{{ login_user }}/ r,
            /mnt/{{ login_user }}/ r,

            owner /run/user/{{ login_uid.stdout }}/** rwklix,
            owner /tmp/** rwkl,
            /tmp/ rw,
            /dev/null rw,
            /dev/zero r,
            /dev/urandom r,
            /dev/random r,
            /dev/tty rw,
            /dev/pts/* rw,

            /proc/ r,
            /proc/self/** r,
            /proc/sys/kernel/random/boot_id r,
            owner /proc/@{pid}/** rw,

            deny /etc/shadow r,
            deny /etc/sudoers r,
            deny /etc/sudoers.d/** r,
            deny /root/** rwklx,
            deny /proc/sys/** rwklx,
            deny /sys/** rwklx,
          }

    - name: Load mandatory AppArmor profile for allocation user
      when: ansible_facts["os_family"] | lower == "debian"
      shell: |
        set -euo pipefail
        apparmor_parser -r /etc/apparmor.d/kloigos-{{ login_user }}
      args:
        executable: /bin/bash

    - name: Attach allocation user manager to AppArmor profile
      when: ansible_facts["os_family"] | lower == "debian"
      copy:
        dest: /etc/systemd/system/user@{{ login_uid.stdout }}.service.d/50-kloigos-apparmor.conf
        mode: "0644"
        content: |
          [Service]
          AppArmorProfile=kloigos-{{ login_user }}

    - name: Force SSH sessions through allocation AppArmor profile
      when: ansible_facts["os_family"] | lower == "debian"
      copy:
        dest: /etc/ssh/sshd_config.d/kloigos-{{ login_user }}.conf
        mode: "0644"
        content: |
          Match User {{ login_user }}
              ForceCommand /usr/local/sbin/kloigos-aa-shell

    - name: Reload SSH after AppArmor login confinement update
      when: ansible_facts["os_family"] | lower == "debian"
      shell: |
        set -euo pipefail
        SSHD_BIN="$(command -v sshd || echo /usr/sbin/sshd)"
        "$SSHD_BIN" -t
        systemctl reload ssh || systemctl reload sshd || true
      args:
        executable: /bin/bash

    - name: Allocate memory proportionate to CPU count
      shell: |
        MEM_TOT=`cat /proc/meminfo | grep "MemTotal" | awk '{print $2}'`
        CPU_COUNT=`cat /proc/cpuinfo | grep -c processor`
        echo $MEM_TOT / $CPU_COUNT | bc
      register: mem_kb_per_cpu

    - name: Get cpu,numa_node from lscpu
      shell: |
        lscpu -p=CPU,NODE | grep -v '#'
      register: lscpu_p

    - name: Build cpu_to_node dict from lscpu
      set_fact:
        cpu_to_node: "{{ cpu_to_node | default({}) | combine({ (item.split(',')[0]): (item.split(',')[1]) }) }}"
      loop: "{{ lscpu_p.stdout_lines }}"

    - name: Write allocation user slice override
      copy:
        content: |
          [Slice]

          AllowedCPUs={{ cpu_set }}
          CPUAccounting=yes
          MemoryAccounting=yes
          IOAccounting=yes
          TasksMax=2048
          AllowedMemoryNodes={{ cpu_to_node[cpu_set.split(',')[0]] }}
          MemoryNodes={{ cpu_to_node[cpu_set.split(',')[0]] }}
          MemoryHigh={{ (cpu_set.split(',') | length * mem_kb_per_cpu.stdout | int / 1024 / 1024) | round(0, 'floor') | int }}G
          MemoryMax={{ (cpu_set.split(',') | length * mem_kb_per_cpu.stdout | int * 0.9 / 1024 / 1024) | round(0, 'floor') | int }}G

        dest: /etc/systemd/system/user-{{ login_uid.stdout }}.slice.d/50-kloigos.conf

    - name: Update nftables allocation source-IP enforcement
      shell: |
        set -euo pipefail
        NFT_FILE="/etc/nftables.d/kloigos-compute-units.nft"
        touch "$NFT_FILE"
        if ! grep -q 'table inet kloigos_compute_units' "$NFT_FILE"; then
          printf '%s\n' \
            'table inet kloigos_compute_units {' \
            '  chain egress_control {' \
            '    type filter hook output priority filter; policy accept;' \
            '  }' \
            '}' > "$NFT_FILE"
        fi
        sed -i -E "/meta skuid {{ login_uid.stdout }} /d" "$NFT_FILE"
        sed -i "/policy accept;/a\\              meta skuid {{ login_uid.stdout }} ip saddr != {{ private_ip }} drop\\n              meta skuid {{ login_uid.stdout }} meta nfproto ipv6 drop" "$NFT_FILE"
        touch /etc/nftables.conf
        grep -qxF 'include "/etc/nftables.d/*.nft"' /etc/nftables.conf || echo 'include "/etc/nftables.d/*.nft"' >> /etc/nftables.conf
        nft -c -f "$NFT_FILE"
        nft -f "$NFT_FILE"
        systemctl enable --now nftables
      args:
        executable: /bin/bash

    - name: setup SSH key so user can login
      copy:
        content: |
          {{ ssh_public_key }}
        dest: /home/{{ login_user }}/.ssh/authorized_keys
        owner: "{{ login_user }}"
        group: "{{ login_user }}"
        mode: "0600"

    - name: Restart allocation user services
      shell: |
        set -euo pipefail
        systemctl daemon-reload
        systemctl restart systemd-logind
        loginctl enable-linger {{ login_user }}
        systemctl restart user@{{ login_uid.stdout }}.service || true
        systemctl restart user-{{ login_uid.stdout }}.slice || true
      args:
        executable: /bin/bash

    - name: create welcome file
      copy:
        content: |
          WELCOME TO COMPUTE UNIT `{{ compute_id }}`!

          This compute unit features:
            - CPU count: {{ cpu_count }}
            - Memory:
            - Max running processes: 
            - Private IP: {{ private_ip }}
            - Public IP: {{ public_ip | default('', true) }}
            - Network bandwidth:
            - Disk volume at /mnt/{{ login_user }}
            - IOPS/MBPS:

          
          You're not root, but you can still use systemd
          to run your services.
          Bind services explicitly to {{ private_ip }}.
          Make sure you save your .service files at directory

          ~/.config/systemd/user/

          and you manage the service using the `--user` flag, Example:  

          systemctl --user daemon-reload
          systemctl --user enable myservice
          systemctl --user start myservice

        dest: /home/{{ login_user }}/WELCOME.txt
